<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BANK FT by rais.project - Search Engine</title>
    
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', }</script>
    
    <!-- React, Babel & Parsers -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body { background-color: #f8fafc; transition: background-color 0.3s ease; }
        html.dark body { background-color: #020617; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        html.dark ::-webkit-scrollbar-thumb { background: #334155; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }
        html.dark .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .bg-glow {
            position: absolute; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(14,165,233,0.15) 0%, rgba(0,0,0,0) 70%);
            top: -150px; left: 50%; transform: translateX(-50%); z-index: -1; pointer-events: none;
        }
        
        .typing-indicator span {
            animation: blink 1.4s infinite both;
            height: 6px; width: 6px;
            background: #38bdf8;
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0% { opacity: 0.2; transform: scale(0.8); }
            20% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.2; transform: scale(0.8); }
        }

        .prose p { margin-bottom: 0.75em; }
        .prose strong { color: #0f172a; font-weight: 600; }
        html.dark .prose strong { color: #f8fafc; }
        
        /* Modal Scroll */
        .modal-scroll { max-height: 60vh; overflow-y: auto; }
    </style>
</head>
<body class="text-slate-800 dark:text-slate-200 antialiased min-h-screen relative overflow-x-hidden selection:bg-sky-500/30 transition-colors duration-300">
    <div class="bg-glow"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS ---
        const SearchIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
        const DatabaseIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>;
        const CheckIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>;
        const LoaderIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;
        const SparklesIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/></svg>;
        const BookOpenIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const SunIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="M2 12h2"/><path d="m6.34 17.66-1.41 1.41"/></svg>;
        const MoonIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>;
        const XIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
        const LogOutIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>;
        const KeyIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></svg>;
        const LayoutDashboardIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>;
        const EyeIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>;
        const EyeOffIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>;
        const AlertIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>;

        const CACHE_DURATION = 24 * 60 * 60 * 1000;
        const SESSION_DURATION = 60 * 60 * 1000; // 1 Jam batas Public/Private

        // --- SISTEM COOKIE ---
        const setCookie = (name, value, days) => {
            const date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            document.cookie = `${name}=${value || ""}; expires=${date.toUTCString()}; path=/`;
        };
        const getCookie = (name) => {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for(let i=0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) === ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length);
            }
            return null;
        };

        // --- PELACAK PERANGKAT & IP ---
        const fetchDeviceDetails = async () => {
            const os = /Windows|Mac|Linux|Android|iOS/.exec(navigator.userAgent)?.[0] || 'Unknown OS';
            const browser = /Chrome|Firefox|Safari|Edge|Opera/.exec(navigator.userAgent)?.[0] || 'Unknown Browser';
            try {
                const res = await fetch('https://api.db-ip.com/v2/free/self');
                const data = await res.json();
                return `IP: ${data.ipAddress} | ${data.city}, ${data.countryName} | ${os} (${browser})`;
            } catch (e) {
                return `OS: ${os} | Browser: ${browser} | (IP Gagal Dilacak)`;
            }
        };

        // --- LOKAL DB ---
        const dbPromise = () => new Promise((res, rej) => {
            const request = indexedDB.open('SmartQuizDB', 1);
            request.onerror = () => rej(request.error);
            request.onsuccess = () => res(request.result);
            request.onupgradeneeded = (e) => e.target.result.createObjectStore('store');
        });
        const setVal = async (key, val) => {
            const db = await dbPromise();
            return new Promise((res, rej) => {
                const tx = db.transaction('store', 'readwrite');
                tx.objectStore('store').put(val, key);
                tx.oncomplete = () => res();
                tx.onerror = () => rej(tx.error);
            });
        };
        const getVal = async (key) => {
            const db = await dbPromise();
            return new Promise((res, rej) => {
                const tx = db.transaction('store', 'readonly');
                const req = tx.objectStore('store').get(key);
                req.onsuccess = () => res(req.result);
                req.onerror = () => rej(req.error);
            });
        };

        const MarkdownDisplay = ({ content }) => {
            const html = marked.parse(content || "");
            return <div className="prose dark:prose-invert max-w-none text-slate-700 dark:text-slate-300 text-sm md:text-base leading-relaxed" dangerouslySetInnerHTML={{ __html: html }} />;
        };

        const App = () => {
            const [userRole, setUserRole] = useState(null); // 'admin', 'private', 'public'
            const [inputKey, setInputKey] = useState("");
            const [showPassword, setShowPassword] = useState(false);
            const [loginError, setLoginError] = useState("");
            const [isAuthenticating, setIsAuthenticating] = useState(false);
            const [authLoading, setAuthLoading] = useState(true);

            // Admin Dashboard States
            const [showDashboard, setShowDashboard] = useState(false);
            const [adminData, setAdminData] = useState(null);
            const [adminLoading, setAdminLoading] = useState(false);
            const [dashboardTab, setDashboardTab] = useState('logs'); 
            const [filterDate, setFilterDate] = useState(""); 
            const [newPub, setNewPub] = useState("");
            const [newPriv, setNewPriv] = useState("");

            // Data States
            const [query, setQuery] = useState("");
            const [db, setDb] = useState({});
            const [dbStatus, setDbStatus] = useState({ state: 'loading', msg: 'Memuat Database...' });
            const [isSearching, setIsSearching] = useState(false);
            const [searchSource, setSearchSource] = useState(null); 
            const [result, setResult] = useState(null);
            const [isDarkMode, setIsDarkMode] = useState(true);

            useEffect(() => {
                const role = localStorage.getItem('session_role');
                const loginTime = localStorage.getItem('session_time');

                if (role === 'admin') {
                    setUserRole('admin');
                } else if (role === 'public' || role === 'private') {
                    const now = Date.now();
                    if (loginTime && (now - parseInt(loginTime) < SESSION_DURATION)) {
                        setUserRole(role);
                    } else {
                        localStorage.removeItem('session_role');
                        localStorage.removeItem('session_time');
                    }
                }
                setAuthLoading(false);
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoginError("");
                setIsAuthenticating(true);

                try {
                    const deviceInfo = await fetchDeviceDetails();
                    
                    const res = await fetch('/api/auth', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'verify', key: inputKey, device: deviceInfo })
                    });
                    const data = await res.json();
                    
                    if (!res.ok) throw new Error(data.error || "Gagal menghubungi server.");
                    
                    if (data.role === 'admin') {
                        localStorage.setItem('session_role', 'admin');
                        setUserRole('admin');
                        localStorage.setItem('admin_temp_key', inputKey); 
                    } 
                    else if (data.role === 'public' || data.role === 'private') {
                        const lockoutKey = `lockout_${data.role}`;
                        if (getCookie(lockoutKey) === 'true') {
                            setLoginError(`Akses Ditolak: Anda telah menggunakan sesi tipe [${data.role.toUpperCase()}] hari ini. Batas 1 perangkat 1x /24 jam.`);
                            setIsAuthenticating(false);
                            return;
                        }
                        
                        setCookie(lockoutKey, 'true', 1);
                        localStorage.setItem('session_role', data.role);
                        localStorage.setItem('session_time', Date.now().toString());
                        setUserRole(data.role);
                    }
                } catch (err) {
                    setLoginError(err.message);
                } finally {
                    setIsAuthenticating(false);
                }
            };

            const handleLogout = () => {
                localStorage.removeItem('session_role');
                localStorage.removeItem('session_time');
                localStorage.removeItem('admin_temp_key');
                setUserRole(null);
                setShowDashboard(false);
            };

            useEffect(() => {
                const savedTheme = localStorage.getItem('theme');
                setIsDarkMode(savedTheme !== 'light');
            }, []);

            useEffect(() => {
                if (isDarkMode) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            }, [isDarkMode]);

            useEffect(() => {
                if (!userRole) return; 
                const fetchDatabase = async () => {
                    try {
                        const cached = await getVal('quiz_db');
                        const cacheTime = await getVal('quiz_db_time');
                        if (cached && cacheTime && (Date.now() - cacheTime < CACHE_DURATION)) {
                            setDb(cached);
                            setDbStatus({ state: 'success', msg: `Tercache (${Object.keys(cached).length} Data)` });
                            return;
                        }

                        setDbStatus({ state: 'loading', msg: 'Mengunduh data baru...' });
                        const response = await fetch('/api/get-sheet');
                        if (!response.ok) throw new Error("Gagal akses spreadsheet");
                        const csvText = await response.text();

                        Papa.parse(csvText, {
                            complete: async (results) => {
                                let newDb = {};
                                results.data.forEach(row => {
                                    for (let i = 0; i < row.length; i += 2) {
                                        const q = row[i]?.trim();
                                        const a = row[i+1]?.trim();
                                        if (q && a) { newDb[q] = a; }
                                    }
                                });
                                try {
                                    await setVal('quiz_db', newDb);
                                    await setVal('quiz_db_time', Date.now());
                                } catch (e) {}
                                setDb(newDb);
                                setDbStatus({ state: 'success', msg: `Tersimpan (${Object.keys(newDb).length})` });
                            }
                        });
                    } catch (err) {
                        setDbStatus({ state: 'error', msg: 'Gagal memuat DB' });
                    }
                };
                fetchDatabase();
            }, [userRole]);

            const openDashboard = async () => {
                setShowDashboard(true);
                setAdminLoading(true);
                try {
                    const res = await fetch('/api/admin', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'get_dashboard', adminKey: localStorage.getItem('admin_temp_key') })
                    });
                    const data = await res.json();
                    if(!res.ok) throw new Error(data.error);
                    setAdminData(data);
                    setNewPub(data.publicKey || "");
                    setNewPriv(data.privateKey || "");
                } catch (e) {
                    alert(e.message);
                } finally {
                    setAdminLoading(false);
                }
            };

            const updateKeys = async (e) => {
                e.preventDefault();
                try {
                    const res = await fetch('/api/admin', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            action: 'update_keys', 
                            adminKey: localStorage.getItem('admin_temp_key'),
                            newPublicKey: newPub,
                            newPrivateKey: newPriv
                        })
                    });
                    if(res.ok) alert("Kode berhasil diubah!");
                } catch(e) {
                    alert("Gagal mengubah kode.");
                }
            };

            const handleSearch = async (e) => {
                e.preventDefault();
                if (!query.trim()) return;

                setIsSearching(true);
                setResult(null);
                setSearchSource(null);

                // Cari lokal
                const normalize = (str) => str.toLowerCase().replace(/[^\w\s]/g, '').trim();
                const normQuery = normalize(query);
                let bestMatch = null; let highestScore = 0;
                
                for (const [q, a] of Object.entries(db)) {
                    const normQ = normalize(q);
                    if (normQ === normQuery) { bestMatch = a; break; }
                    if (normQ.includes(normQuery) || normQuery.includes(normQ)) {
                        const score = Math.min(normQ.length, normQuery.length) / Math.max(normQ.length, normQuery.length);
                        if (score > highestScore) { highestScore = score; bestMatch = a; }
                    }
                }
                
                const dbMatch = highestScore > 0.25 ? bestMatch : null;

                if (dbMatch) {
                    setResult(dbMatch);
                    setSearchSource('db');
                    setIsSearching(false);
                } else {
                    // Logic Pemanggilan AI
                    if (userRole === 'admin' || userRole === 'private') {
                        setSearchSource('ai');
                        try {
                            const response = await fetch('/api/ai-search', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ query })
                            });
                            const data = await response.json();
                            
                            // Handling Error API Gemini agar ditampilkan detail aslinya
                            if (response.ok) {
                                setResult(data.answer);
                            } else {
                                setResult(`⚠️ Error AI Server: ${data.error || 'Terjadi kesalahan internal server.'}`);
                            }
                        } catch(e) { 
                            setResult("⚠️ Gagal menghubungi server backend. Pastikan koneksi internet stabil."); 
                        }
                    } else {
                        setSearchSource('not-found');
                        setResult("Maaf, jawaban tidak ditemukan di database Bank Soal.");
                    }
                    setIsSearching(false);
                }
            };

            if (authLoading) return <div className="min-h-screen flex items-center justify-center"><LoaderIcon className="w-8 h-8 animate-spin text-sky-500" /></div>;

            // --- LOCK SCREEN ---
            if (!userRole) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4">
                        <div className="glass-panel max-w-md w-full p-8 rounded-3xl flex flex-col items-center text-center">
                            <div className="h-16 w-16 rounded-2xl bg-sky-500/10 dark:bg-sky-500/20 flex items-center justify-center border border-sky-500/20 dark:border-sky-500/30 mb-6">
                                <KeyIcon className="text-sky-500 dark:text-sky-400 w-8 h-8" />
                            </div>
                            <h1 className="text-2xl font-bold bg-gradient-to-r from-slate-800 to-slate-500 dark:from-white dark:to-slate-400 bg-clip-text text-transparent mb-2">Akses Terkunci</h1>
                            <p className="text-sm text-slate-500 dark:text-slate-400 mb-8">Masukkan Kunci Akses untuk membuka Search Engine.</p>
                            
                            <form onSubmit={handleLogin} className="w-full relative">
                                <div className="relative">
                                    <input
                                        type={showPassword ? "text" : "password"}
                                        value={inputKey}
                                        onChange={(e) => setInputKey(e.target.value)}
                                        placeholder="Masukkan Kunci..."
                                        className="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl py-3 pl-4 pr-12 text-slate-800 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-sky-500 mb-4"
                                        required
                                    />
                                    <button 
                                        type="button" 
                                        onClick={() => setShowPassword(!showPassword)}
                                        className="absolute right-3 top-3.5 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"
                                    >
                                        {showPassword ? <EyeOffIcon className="w-5 h-5"/> : <EyeIcon className="w-5 h-5"/>}
                                    </button>
                                </div>
                                {loginError && (
                                    <div className="text-rose-500 text-sm mb-4 bg-rose-500/10 p-3 rounded-lg border border-rose-500/20 text-left flex items-start gap-2">
                                        <AlertIcon className="w-5 h-5 flex-shrink-0" />
                                        <span>{loginError}</span>
                                    </div>
                                )}
                                <button type="submit" disabled={isAuthenticating || !inputKey.trim()} className="w-full py-3 px-4 bg-sky-500 hover:bg-sky-400 disabled:opacity-50 text-white rounded-xl font-medium transition-all flex items-center justify-center">
                                    {isAuthenticating ? <LoaderIcon className="w-5 h-5 animate-spin" /> : "Buka Akses"}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            // --- DASHBOARD ADMIN MODAL ---
            if (showDashboard && userRole === 'admin') {
                let displayedLogs = adminData?.logs || [];
                if (filterDate) {
                    const [y, m, d] = filterDate.split('-');
                    const targetFormat = `${d}/${m}/${y}`;
                    displayedLogs = displayedLogs.filter(log => log[0].startsWith(targetFormat));
                }
                displayedLogs = displayedLogs.slice(0, 20);

                return (
                    <div className="min-h-screen p-4 md:p-8 flex justify-center">
                        <div className="w-full max-w-4xl glass-panel rounded-3xl p-6 flex flex-col h-fit">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-xl font-bold flex items-center gap-2"><LayoutDashboardIcon className="w-6 h-6 text-sky-500"/> Admin Dashboard</h2>
                                <button onClick={() => setShowDashboard(false)} className="text-slate-500 hover:text-slate-800 dark:hover:text-white"><XIcon className="w-6 h-6"/></button>
                            </div>

                            <div className="flex gap-4 mb-6 border-b border-slate-300 dark:border-slate-700">
                                <button onClick={() => setDashboardTab('logs')} className={`pb-2 px-2 font-medium ${dashboardTab === 'logs' ? 'text-sky-500 border-b-2 border-sky-500' : 'text-slate-500'}`}>Riwayat Login (20)</button>
                                <button onClick={() => setDashboardTab('keys')} className={`pb-2 px-2 font-medium ${dashboardTab === 'keys' ? 'text-sky-500 border-b-2 border-sky-500' : 'text-slate-500'}`}>Kelola Kunci Akses</button>
                            </div>

                            {adminLoading ? (
                                <div className="py-20 flex justify-center"><LoaderIcon className="w-8 h-8 animate-spin text-sky-500" /></div>
                            ) : dashboardTab === 'keys' ? (
                                <form onSubmit={updateKeys} className="space-y-4 max-w-md">
                                    <div>
                                        <label className="text-xs font-semibold text-slate-500 mb-1 block">Public Key (Tanpa AI)</label>
                                        <input type="text" value={newPub} onChange={e=>setNewPub(e.target.value)} className="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-lg p-2.5" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-semibold text-slate-500 mb-1 block">Private Key (Full AI)</label>
                                        <input type="text" value={newPriv} onChange={e=>setNewPriv(e.target.value)} className="w-full bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-lg p-2.5" />
                                    </div>
                                    <button type="submit" className="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-lg font-medium">Update Kunci</button>
                                </form>
                            ) : (
                                <div className="flex flex-col gap-4">
                                    <div className="flex items-center gap-3">
                                        <label className="text-sm font-medium">Filter Tanggal:</label>
                                        <input type="date" value={filterDate} onChange={e => setFilterDate(e.target.value)} className="bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-lg p-2 text-sm" />
                                        {filterDate && <button onClick={() => setFilterDate('')} className="text-xs bg-rose-500/20 text-rose-500 px-2 py-1 rounded">Reset</button>}
                                    </div>
                                    <div className="overflow-x-auto modal-scroll bg-white/50 dark:bg-slate-900/50 rounded-xl border border-slate-200 dark:border-slate-700">
                                        <table className="w-full text-sm text-left">
                                            <thead className="bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 text-xs uppercase sticky top-0">
                                                <tr>
                                                    <th className="px-4 py-3">Waktu (WIB)</th>
                                                    <th className="px-4 py-3">Perangkat / IP Lokasi</th>
                                                    <th className="px-4 py-3">Role</th>
                                                    <th className="px-4 py-3">Status</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-200 dark:divide-slate-700">
                                                {displayedLogs.map((log, i) => (
                                                    <tr key={i} className="hover:bg-white dark:hover:bg-slate-800">
                                                        <td className="px-4 py-3 whitespace-nowrap">{log[0]}</td>
                                                        <td className="px-4 py-3 text-xs">{log[1]}</td>
                                                        <td className="px-4 py-3 font-medium">{log[2]}</td>
                                                        <td className="px-4 py-3">{log[3]}</td>
                                                    </tr>
                                                ))}
                                                {displayedLogs.length === 0 && (
                                                    <tr><td colSpan="4" className="text-center py-6 text-slate-500">Tidak ada data login pada tanggal tersebut.</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            // --- TAMPILAN SEARCH ENGINE (UTAMA) ---
            return (
                <div className="min-h-screen flex flex-col items-center p-4 md:p-8 w-full max-w-3xl mx-auto animate-in fade-in">
                    <header className="w-full flex items-center justify-between mb-8 mt-4">
                        <div className="flex items-center gap-3">
                            <div className="h-10 w-10 rounded-xl bg-sky-500/10 dark:bg-sky-500/20 flex items-center justify-center border border-sky-500/20">
                                <BookOpenIcon className="text-sky-500 w-6 h-6" />
                            </div>
                            <div>
                                <h1 className="text-xl font-bold bg-gradient-to-r from-slate-800 to-slate-500 dark:from-white dark:to-slate-400 bg-clip-text text-transparent">BANK-FT</h1>
                                <p className="text-xs font-semibold text-slate-500 flex items-center gap-1 mt-0.5">
                                    <span className="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></span>
                                    {userRole === 'admin' ? "Sesi Admin" : userRole === 'private' ? "Sesi Private (Full AI)" : "Sesi Publik (1 Jam)"}
                                </p>
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-2 md:gap-3">
                            {userRole === 'admin' && (
                                <button onClick={openDashboard} className="p-2 rounded-full hover:bg-sky-100 dark:hover:bg-sky-900/30 text-sky-500 transition-colors" title="Dashboard">
                                    <LayoutDashboardIcon className="w-5 h-5" />
                                </button>
                            )}
                            <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 text-slate-500 transition-colors">
                                {isDarkMode ? <SunIcon className="w-5 h-5" /> : <MoonIcon className="w-5 h-5" />}
                            </button>
                            <button onClick={handleLogout} className="p-2 rounded-full hover:bg-rose-100 dark:hover:bg-rose-900/30 text-rose-500 transition-colors" title="Keluar">
                                <LogOutIcon className="w-5 h-5" />
                            </button>
                        </div>
                    </header>

                    <main className="w-full flex-1 flex flex-col items-center">
                        <form onSubmit={handleSearch} className="w-full relative group z-10 mb-8">
                            <div className="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                                <SearchIcon className="w-5 h-5 text-slate-400 group-focus-within:text-sky-500 transition-colors" />
                            </div>
                            <input
                                type="text" value={query} onChange={(e) => setQuery(e.target.value)}
                                placeholder="Masukkan soal ujian / kuis di sini..."
                                className="w-full bg-white/60 dark:bg-slate-900/60 backdrop-blur-md border border-slate-300/50 dark:border-slate-700/50 rounded-2xl py-4 pl-12 pr-28 text-slate-800 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-sky-500/50 transition-all shadow-xl"
                            />
                            <div className="absolute inset-y-2 right-2 flex items-center gap-2">
                                <button type="submit" disabled={isSearching || !query.trim()} className="h-full px-5 bg-sky-500 hover:bg-sky-400 text-white rounded-xl font-medium transition-all disabled:opacity-50">
                                    Cari
                                </button>
                            </div>
                        </form>

                        {isSearching && searchSource === 'ai' && (
                            <div className="w-full glass-panel rounded-2xl p-6 flex flex-col items-center space-y-4 animate-in zoom-in">
                                <div className="h-14 w-14 rounded-full bg-indigo-500/10 flex items-center justify-center">
                                    <SparklesIcon className="w-6 h-6 text-indigo-400 animate-pulse" />
                                </div>
                                <h3 className="text-sm font-medium text-indigo-300 mb-1">Mencari via AI & Web Search...</h3>
                                <div className="typing-indicator text-indigo-500 dark:text-indigo-400/50">
                                    <span></span><span></span><span></span>
                                </div>
                            </div>
                        )}

                        {result && !isSearching && (
                            <div className="w-full flex flex-col gap-4 animate-in slide-in-from-bottom-4">
                                <div className="glass-panel rounded-2xl p-6 relative overflow-hidden group">
                                    <div className="relative z-10">
                                        {searchSource === 'db' || searchSource === 'not-found' ? (
                                            <div className="text-lg md:text-xl font-medium leading-relaxed">
                                                {result}
                                            </div>
                                        ) : (
                                            <MarkdownDisplay content={result} />
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
