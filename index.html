<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BANK FT by rais.project - Search Engine</title>
    
    <meta name="theme-color" content="#0f172a">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', }</script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body { background-color: #f8fafc; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [userRole, setUserRole] = useState(null);
            const [query, setQuery] = useState("");
            const [db, setDb] = useState({});
            const [result, setResult] = useState(null);
            const [isSearching, setIsSearching] = useState(false);
            const [status, setStatus] = useState("Memuat...");

            useEffect(() => {
                const role = localStorage.getItem('session_role') || 'public';
                setUserRole(role);
                loadDatabase();
            }, []);

            const loadDatabase = async () => {
                try {
                    // Menggunakan URL absolut yang mengarah ke Vercel backend
                    const response = await fetch(window.location.origin + '/api/get-sheet');
                    if (!response.ok) throw new Error("Gagal akses API");
                    const csvText = await response.text();
                    Papa.parse(csvText, {
                        complete: (results) => {
                            let newDb = {};
                            results.data.forEach(row => {
                                for (let i = 0; i < row.length; i += 2) {
                                    if (row[i]) newDb[row[i].toLowerCase().trim()] = row[i+1];
                                }
                            });
                            setDb(newDb);
                            setStatus("Siap");
                        }
                    });
                } catch (e) { 
                    setStatus("Gagal memuat DB: " + e.message);
                }
            };

            const handleSearch = async (e) => {
                e.preventDefault();
                setIsSearching(true);
                setResult(null);

                const normQ = query.toLowerCase().trim();
                if (db[normQ]) {
                    setResult(db[normQ]);
                } else if (userRole === 'admin' || userRole === 'private') {
                    try {
                        const res = await fetch(window.location.origin + '/api/ai-search', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ query })
                        });
                        const data = await res.json();
                        setResult(res.ok ? data.answer : "⚠️ " + data.error);
                    } catch (e) { setResult("Error koneksi AI."); }
                } else {
                    setResult("Tidak ditemukan di database.");
                }
                setIsSearching(false);
            };

            return (
                <div className="max-w-3xl mx-auto p-4">
                    <h1 className="text-2xl font-bold mb-4">BANK-FT</h1>
                    <p className="text-xs mb-4 text-slate-500">Status: {status}</p>
                    <form onSubmit={handleSearch} className="flex gap-2 mb-4">
                        <input className="flex-1 border p-2 rounded" value={query} onChange={(e)=>setQuery(e.target.value)} placeholder="Cari soal..." />
                        <button type="submit" className="bg-sky-500 text-white px-4 py-2 rounded">Cari</button>
                    </form>
                    {isSearching ? <div>Mencari...</div> : result && <div className="p-4 bg-white border rounded shadow">{result}</div>}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
